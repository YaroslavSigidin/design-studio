# Sample nginx snippet for Timeweb VPS / custom nginx configs.
# Shared hosting may already terminate TLS on nginx in front of Apache.

server {
  listen 80;
  server_name soglasovano.online www.soglasovano.online;
  root /home/c/ca568679/public_html;
  index index.php index.html;

  error_page 404 /404.html;

  location = /404.html {
    internal;
  }

  location = / {
    add_header Link '</.well-known/api-catalog>; rel="api-catalog", </llms.txt>; rel="describedby", </sitemap.xml>; rel="describedby", </auth.md>; rel="alternate"; type="text/markdown"' always;
    try_files /index.php /index.html =404;
  }

  location = /.well-known/api-catalog {
    default_type application/linkset+json;
    try_files /api-catalog.php /api-catalog =404;
    # When using the PHP helper under .well-known/:
    # fastcgi_pass to api-catalog.php instead.
  }

  location ^~ /.well-known/ {
    try_files $uri $uri/ =404;
  }

  location ~* \.(json|md|txt|xml)$ {
    try_files $uri =404;
  }

  location / {
    try_files $uri $uri/ =404;
  }
}
