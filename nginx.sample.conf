# Sample nginx snippet for Timeweb VPS / custom nginx configs.
# Critical for agent markdown negotiation: do not prefer a static index.html.

server {
  listen 80;
  server_name soglasovano.online www.soglasovano.online;
  root /home/c/ca568679/public_html;
  index index.php;

  error_page 404 /404.html;

  location = /404.html {
    internal;
  }

  location = / {
    add_header Link '</.well-known/api-catalog>; rel="api-catalog", </llms.txt>; rel="describedby", </sitemap.xml>; rel="describedby", </auth.md>; rel="alternate"; type="text/markdown"' always;
    include fastcgi_params;
    # fastcgi_pass unix:/var/run/php/php-fpm.sock;
    # fastcgi_param SCRIPT_FILENAME $document_root/index.php;
  }

  types {
    text/markdown md;
    application/json json;
  }

  location = /.well-known/api-catalog {
    include fastcgi_params;
    # fastcgi_pass unix:/var/run/php/php-fpm.sock;
    # fastcgi_param SCRIPT_FILENAME $document_root/.well-known/api-catalog.php;
  }

  location ^~ /.well-known/ {
    try_files $uri $uri/ =404;
  }

  location ~* \.(json|md|txt|xml)$ {
    try_files $uri =404;
  }

  location ~ \.php$ {
    try_files $uri =404;
    include fastcgi_params;
    # fastcgi_pass unix:/var/run/php/php-fpm.sock;
    # fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
  }

  location / {
    try_files $uri $uri/ =404;
  }
}
