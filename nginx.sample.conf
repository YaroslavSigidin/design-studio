# Sample nginx snippet for Timeweb VPS / custom nginx configs.
# Place 404.html in the site root (same directory as index.html).

server {
  listen 80;
  server_name example.com www.example.com;
  root /var/www/design-studio;
  index index.html;

  error_page 404 /404.html;

  location = /404.html {
    internal;
  }

  location / {
    try_files $uri $uri/ /404.html;
  }
}
