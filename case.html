    <script>
      (() => {
        const coarse = window.matchMedia("(pointer: coarse)").matches;
        const narrow = window.matchMedia("(max-width: 1100px)").matches;
        const reduced = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
        const saveData = Boolean(navigator.connection && navigator.connection.saveData);
        const cores = Number.isFinite(navigator.hardwareConcurrency)
          ? navigator.hardwareConcurrency
          : null;
        const root = document.documentElement;
        let profile = "full";
        if (reduced || saveData || (cores !== null && cores <= 2)) profile = "lite";
        else if (coarse || narrow || (cores !== null && cores <= 4)) profile = "balanced";
        root.classList.add("studio-perf-" + profile);
        root.dataset.studioPerf = profile;
      })();
    </script>

    <div class="brief-modal" id="briefModal" aria-hidden="true">

            <label class="brief-field brief-field--bare">
              <input type="text" name="name" placeholder="Как к вам обращаться" autocomplete="name" required />

            <label class="brief-field brief-field--bare">

            </label>

          <div class="brief-service-select" data-brief-service-select>

                <path d="M5 7.5L10 12.5L15 7.5" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" />
              </svg>
            </button>
            <div class="brief-service-select__menu" hidden aria-hidden="true" data-brief-service-menu></div>
            <input type="hidden" name="service" id="briefServiceValue" required />
          </div>

          <div class="brief-range-grid">
            <label class="brief-field brief-field--range">
              <div class="brief-range-head">
                <span>Бюджет</span>
                <strong data-brief-budget-label>150 000 ₽</strong>
              </div>
              <input type="range" name="budget" min="5" max="500" step="5" value="150" data-brief-budget-range />
            </label>

            <label class="brief-field brief-field--range">
              <div class="brief-range-head">
                <span>Сроки запуска</span>
                <strong data-brief-deadline-label>30 дней</strong>
              </div>
              <input
                type="range"
                name="deadline"
                min="1"
                max="180"
                step="1"
                value="30"
                data-brief-deadline-range
              />
            </label>
          </div>

          <label class="brief-field brief-field--bare brief-field--full">
            <textarea
              name="comment"
              rows="4"
              placeholder="Опишите цели, что уже готово и какой результат ожидаете"
            ></textarea>
          </label>

          <label class="form-consent">
            <input type="checkbox" name="privacy" value="1" required checked />
            <span
